services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: documind-postgres
    environment:
      POSTGRES_DB: documind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - documind-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d documind"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: documind-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/DocuMind.Api/Dockerfile
    container_name: documind-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=documind;Username=postgres;Password=postgres
      Postgres__Schema: public
      LocalStorage__BasePath: storage
      LocalStorage__UploadsPath: uploads
      LocalStorage__ProcessedPath: processed
      RabbitMQ__Enabled: "true"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__VirtualHost: /
      RabbitMQ__ExchangeName: documents.ingestion
      RabbitMQ__QueueName: documents.ingestion.requested
      RabbitMQ__RoutingKey: documents.uploaded
      RabbitMQ__DeadLetterExchangeName: documents.ingestion.dlx
      RabbitMQ__DeadLetterQueueName: documents.ingestion.requested.dlq
      RabbitMQ__DeadLetterRoutingKey: documents.uploaded.dlq
      RabbitMQ__PrefetchCount: "1"
      RabbitMQ__PublishBatchSize: "20"
      RabbitMQ__PollIntervalSeconds: "2"
      DOCUMIND_OPENAI_API_KEY: ${DOCUMIND_OPENAI_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - documind-storage:/app/storage

volumes:
  documind-postgres-data:
  documind-storage:
